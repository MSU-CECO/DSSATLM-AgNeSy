[project]
name = "dssatlm"
version = "0.2.0"
description = "DSPy-based LLM orchestration layer for DSSAT agricultural simulation"
authors = [{ name = "JK" }]
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "dspy>=2.5.0",
    "dssatsim>=0.1.2",
    "pandas>=2.2.2",
    "wandb>=0.19.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-mock>=3.14.0",
]

[tool.uv.sources]
dssatsim = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dssatlm"]

