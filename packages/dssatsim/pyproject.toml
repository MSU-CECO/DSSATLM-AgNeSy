[project]
name = "dssatsim"
version = "0.2.0"
description = "DSSAT simulation wrapper — part of DSSATLM-AgNeSy monorepo"
requires-python = ">=3.12"
dependencies = [
    "dssattools>=3.0",
    "httpx>=0.27.0",
    "pandas>=2.2.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.21.0",      # mock httpx calls in tests
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dssatsim"]

[tool.pytest.ini_options]
pythonpath = ["."]


